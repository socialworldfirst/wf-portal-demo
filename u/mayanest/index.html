<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280" />
<meta name="robots" content="noindex,nofollow" />
<title>万里汇 WorldFirst</title>
<link rel="shortcut icon" href="../../assets/favicon.png" />
<link rel="icon" href="../../assets/favicon.png" />
<style>
  :root{
    --red:#FF0051; --red-d:#E0004a; --red-soft:#FFE9F0;
    --ink:#1A1A1A; --ink-2:#6B6B72; --ink-3:#9A9AA2;
    --line:#ECECEF; --line-2:#F4F4F7;
    --link:#4E5BD6; --green:#00B578; --green-soft:#E6F8F1;
    --grad-a:#EAF1FF; --grad-b:#F4ECFF;
    --side:256px; --top:64px;
    --font:"Roboto","PingFang SC",-apple-system,"system-ui","Segoe UI","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);color:var(--ink);background:#fff;font-size:14px;-webkit-font-smoothing:antialiased}
  a{color:var(--link);text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  img{display:block}
  .flag{width:24px;height:24px;border-radius:50%;object-fit:cover;background:#eee;flex:none}
  .ri{fill:currentColor;display:inline-block;vertical-align:-0.15em}
  .logo-img{height:22px;width:auto;display:block}
  .banner-img{width:100%;display:block;border-radius:14px}
  .app-ico{width:24px;height:24px;border-radius:6px;display:block}
  .amt{transition:color .2s}
  .ti-img{width:44px;height:44px;flex:none;object-fit:contain}

  /* ---------- LOGIN ---------- */
  #login{position:fixed;inset:0;z-index:50;display:flex;background:#fff;transition:opacity .5s ease}
  #login.hide{opacity:0;pointer-events:none}
  .lg-brand{flex:1.1;background:linear-gradient(135deg,#FF2D6E 0%,#FF0051 55%,#D6003f 100%);color:#fff;
    display:flex;flex-direction:column;justify-content:center;padding:0 8vw;position:relative;overflow:hidden}
  .lg-brand::after{content:"";position:absolute;right:-120px;bottom:-120px;width:420px;height:420px;border-radius:50%;background:rgba(255,255,255,.08)}
  .lg-brand::before{content:"";position:absolute;left:-80px;top:-80px;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.06)}
  .lg-logo{margin-bottom:28px}
  .lg-logo img{height:30px;display:block}
  .lg-h{font-size:34px;font-weight:700;line-height:1.35;margin-bottom:18px;position:relative;z-index:1}
  .lg-sub{font-size:16px;opacity:.92;line-height:1.9;position:relative;z-index:1}
  .lg-form{flex:1;display:flex;align-items:center;justify-content:center}
  .lg-card{width:380px}
  .lg-card h2{font-size:24px;font-weight:700;margin-bottom:4px}
  .lg-card .muted{color:var(--ink-3);margin-bottom:30px}
  .lg-tabs{display:flex;gap:28px;border-bottom:1px solid var(--line);margin-bottom:26px}
  .lg-tabs span{padding-bottom:12px;color:var(--ink-2);font-size:15px;cursor:pointer}
  .lg-tabs span.on{color:var(--ink);font-weight:600;border-bottom:2px solid var(--red)}
  .fld{display:flex;align-items:center;border:1px solid var(--line);border-radius:8px;height:48px;padding:0 14px;margin-bottom:16px;transition:border .2s}
  .fld:focus-within{border-color:var(--red)}
  .fld .pre{color:var(--ink-2);padding-right:10px;border-right:1px solid var(--line);margin-right:12px;font-size:15px}
  .fld input{border:none;outline:none;flex:1;font-size:15px;font-family:inherit;color:var(--ink);background:transparent}
  .fld .sms{color:var(--red);font-size:13px;white-space:nowrap;cursor:pointer}
  .lg-btn{width:100%;height:48px;border-radius:999px;background:var(--red);color:#fff;font-size:16px;font-weight:600;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s}
  .lg-btn:hover{background:var(--red-d)}
  .lg-row{display:flex;justify-content:space-between;margin-top:18px;font-size:13px;color:var(--ink-2)}
  .spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.45);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ---------- APP SHELL ---------- */
  #app{display:none;min-height:100vh}
  #app.show{display:block}
  .side{position:fixed;top:0;left:0;bottom:0;width:var(--side);background:#fff;border-right:1px solid var(--line);overflow-y:auto;z-index:20}
  .side::-webkit-scrollbar{width:6px}.side::-webkit-scrollbar-thumb{background:#e4e4e8;border-radius:3px}
  .logo{height:var(--top);display:flex;align-items:center;gap:9px;padding:0 22px;font-weight:800;font-size:25px;color:var(--red);position:sticky;top:0;background:#fff;z-index:2}
  .logo .wf{display:flex;flex-direction:column;line-height:1.1;font-size:11px;color:#2b2b3a;font-weight:700;letter-spacing:.5px}
  .logo .wf b{color:var(--red);font-size:11px}
  .nav{padding:6px 12px 30px}
  .nav-item{display:flex;align-items:center;gap:14px;height:48px;padding:0 16px;border-radius:10px;color:#3a3a42;cursor:pointer;font-size:14px;user-select:none;position:relative;margin-bottom:4px}
  .nav-item:hover{background:var(--line-2)}
  .nav-item.on{background:#F3F3F8;color:var(--ink);font-weight:600}
  .nav-item .ico{width:18px;height:18px;flex:none;color:#86868f;display:flex}
  .nav-item.on .ico{color:var(--red)}
  .nav-item .car{margin-left:auto;width:14px;height:14px;transition:transform .2s;color:#b7b7be;display:flex}
  .nav-item.open .car{transform:rotate(180deg)}
  .sub{overflow:hidden;max-height:0;transition:max-height .25s ease}
  .sub.open{max-height:340px}
  .sub-item{display:flex;align-items:center;height:44px;padding:0 16px 0 48px;border-radius:10px;color:#5a5a63;cursor:pointer;font-size:14px;margin-bottom:2px}
  .sub-item:hover{background:var(--line-2)}
  .sub-item.on{color:var(--red);font-weight:600;background:#FFF1F5}
  .demo-tag{margin:8px 20px 24px;font-size:11px;color:#c2c2c9;letter-spacing:1.5px}

  .main{margin-left:var(--side)}
  .top{height:var(--top);display:flex;align-items:center;gap:16px;padding:0 32px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:15}
  .promo-sel{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:8px;height:38px;padding:0 14px;color:#3a3a42;font-size:13.5px;position:relative}
  .promo-sel .dot{position:absolute;top:-3px;right:-3px;width:8px;height:8px;background:var(--red);border-radius:50%}
  .top .grow{flex:1}
  .app-btn{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:8px;height:38px;padding:0 14px;font-size:13.5px;color:#3a3a42}
  .app-btn .qr{width:22px;height:22px;border-radius:5px;background:var(--red);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700}
  .top .lk{color:#3a3a42;font-size:13.5px;cursor:pointer}
  .bell{position:relative;color:#5a5a63;cursor:pointer;display:flex}
  .bell .b{position:absolute;top:-8px;left:11px;background:var(--red);color:#fff;font-size:10px;border-radius:9px;padding:1px 5px;font-weight:600}
  .user{display:flex;align-items:center;gap:9px;cursor:pointer}
  .user .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#FF6f9c,#FF0051);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex:none}
  .user #uname{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .content{padding:30px 32px 60px;max-width:1380px}

  /* ---------- COMPONENTS ---------- */
  .page-h{font-size:22px;font-weight:700;margin-bottom:22px;display:flex;align-items:center;gap:14px}
  .page-h .act{margin-left:auto}
  .btn-pill{height:38px;border-radius:999px;background:var(--red);color:#fff;font-weight:600;padding:0 20px;font-size:14px;display:inline-flex;align-items:center;gap:6px}
  .btn-pill:hover{background:var(--red-d)}
  .grid{display:grid;gap:20px}
  .col-2{grid-template-columns:1fr 380px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px 24px}
  .sec-h{font-size:18px;font-weight:700;margin:30px 0 16px;display:flex;align-items:center;gap:10px}
  .sec-h .sm{font-size:13px;color:var(--ink-3);font-weight:400}

  .banner{height:120px;border-radius:14px;background:linear-gradient(90deg,#FD3A4B 0%,#FD3A4B 52%,#F31C46 100%);color:#fff;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .banner-deco{position:absolute;left:14px;top:50%;transform:translateY(-50%);height:122px;width:auto;z-index:1}
  .banner h3{font-size:25px;font-weight:800;letter-spacing:.5px;position:relative;z-index:2;text-align:center}
  .banner h3 b{color:#FFE34D}
  .banner .more{position:absolute;right:36px;top:50%;transform:translateY(-50%);background:#fff;color:#E10449;height:38px;border-radius:999px;padding:0 22px;font-weight:700;display:flex;align-items:center;z-index:2;font-size:14px}

  .todo .row{display:flex;align-items:center;gap:16px;padding:18px 4px;border-bottom:1px solid var(--line-2)}
  .todo .row:last-child{border-bottom:none}
  .todo .ti{width:40px;height:40px;border-radius:9px;background:#FFF1F5;display:flex;align-items:center;justify-content:center;color:var(--red);flex:none}
  .todo .tt{font-weight:600;margin-bottom:3px}
  .todo .td{color:var(--ink-3);font-size:13px;max-width:560px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .todo .go{margin-left:auto;color:var(--red);font-weight:600;display:flex;align-items:center;gap:4px;white-space:nowrap;cursor:pointer}

  .quick{display:flex;gap:14px;flex-wrap:wrap}
  .qbtn{display:flex;align-items:center;gap:9px;height:48px;border-radius:999px;border:1px solid var(--line);padding:0 22px;font-weight:600;color:#3a3a42;background:#fff}
  .qbtn.pri{background:var(--red);color:#fff;border-color:var(--red)}
  .qbtn .qi{width:18px;height:18px;display:flex}

  .asset-card{background:linear-gradient(120deg,var(--grad-a),var(--grad-b));border:none}
  .asset-card .at{font-size:17px;font-weight:700;margin-bottom:8px}
  .asset-card p{color:#4a4a55;line-height:1.85;font-size:13.5px;max-width:900px}
  .asset-card .add{margin-top:16px;color:var(--link);font-weight:600;display:inline-flex;gap:5px;cursor:pointer}
  .assets-tools{margin-left:auto;display:flex;gap:18px;font-weight:400;font-size:13px;color:#6B6B72}
  .assets-tools span{display:flex;align-items:center;gap:5px;cursor:pointer}
  .assets-bar{display:flex;align-items:flex-end;gap:20px;margin-bottom:20px;flex-wrap:wrap}
  .assets-total{font-size:14px;color:#3a3a42;display:flex;align-items:center;gap:7px}
  .assets-total b{font-size:28px;font-weight:700;color:var(--ink);letter-spacing:.3px}
  .assets-total .u{font-size:15px;color:var(--ink-2);font-weight:600}
  .assets-month{margin-left:auto;color:#9a9aa2;font-size:13px;display:flex;align-items:center;gap:8px}
  .assets-month .kanban{color:#3a3a42;font-weight:600;display:inline-flex;align-items:center;gap:6px;cursor:pointer}
  .assets-month .nf{background:#FFF1F5;color:var(--red);font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px}
  .acards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .acards.collapsed .acard:nth-child(n+4){display:none}
  .acard{background:#FAFAFB;border:1px solid #F1F1F4;border-radius:14px;padding:20px 22px}
  .acard .ah{display:flex;align-items:center;gap:11px;margin-bottom:14px}
  .acard .ah img{width:34px;height:34px;border-radius:50%;object-fit:cover}
  .acard .ah b{font-size:15px}
  .acard .big{font-size:26px;font-weight:700;letter-spacing:.3px;margin-bottom:14px}
  .acard .big small{font-size:15px;color:var(--ink-2);font-weight:600;margin-left:5px}
  .acard .arow{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:#6B6B72;padding:5px 0}
  .acard .arow .lbl{display:flex;align-items:center;gap:5px}
  .acard .arow .val{color:#3a3a42}
  .acard .arow.un,.acard .arow.un .val{color:#E8890C}
  .assets-more{display:flex;justify-content:center;margin-top:18px}
  .assets-more button{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:#fff;color:#9a9aa2;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
  .assets-more button:hover{color:var(--red);border-color:var(--red)}
  .assets-more button svg{transition:transform .2s}
  .assets-more.open button svg{transform:rotate(180deg)}

  .txn{padding:6px 0}
  .txn .row{display:flex;align-items:center;gap:14px;padding:14px 6px;border-bottom:1px solid var(--line-2)}
  .txn .row:last-child{border-bottom:none}
  .txn .ar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;font-size:16px;background:#F2F2F5;color:#3a3a42;font-weight:400}
  .txn .who{font-weight:600;font-size:15px;line-height:1.3}
  .txn .meta{color:var(--ink-3);font-size:12.5px;margin-top:5px}
  .txn .meta .ok{color:var(--green);margin-right:8px}
  .txn .amt{margin-left:auto;font-size:17px;font-weight:700}
  .txn .amt small{font-size:12px;color:var(--ink-3);font-weight:500;margin-left:4px}
  .viewall{color:var(--link);font-weight:600;display:inline-block;margin-top:14px;cursor:pointer}

  .fx .fxh{display:flex;align-items:center;margin-bottom:6px}
  .fx .fxh b{font-size:18px}
  .fx .fxh .upd{margin-left:auto;color:var(--ink-3);font-size:12px;display:flex;align-items:center;gap:8px}
  .fx .ring{width:26px;height:26px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--red);animation:sp 4s linear infinite}
  .fx .fav{display:flex;align-items:center;margin:14px 0 6px;color:var(--ink-2);font-size:13px}
  .fx .fav .ed{margin-left:auto;border:1px solid var(--line);border-radius:8px;padding:5px 12px;color:#3a3a42;display:flex;gap:6px;align-items:center}
  .rate{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--line-2)}
  .rate:last-child{border-bottom:none}
  .rate .rr{flex:1;font-size:14px;color:#3a3a42}
  .rate svg{flex:none}
  .cal{margin-top:20px}
  .cal .ct{color:#4a4a55;font-size:13.5px;line-height:1.7}

  /* account list */
  .seg{display:flex;gap:30px;border-bottom:1px solid var(--line);margin-bottom:22px}
  .seg span{padding-bottom:13px;color:var(--ink-2);cursor:pointer;font-size:15px}
  .seg span.on{color:var(--red);font-weight:600;border-bottom:2px solid var(--red)}
  .search{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:8px;height:42px;width:330px;padding:0 14px;margin-bottom:24px;color:var(--ink-3)}
  .search input{border:none;outline:none;flex:1;font-size:14px;font-family:inherit}
  .acct-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .acct{border-radius:14px;background:linear-gradient(125deg,var(--grad-a),var(--grad-b));padding:20px 22px;min-height:150px;display:flex;flex-direction:column;border:1px solid #EEF0FA}
  .acct .ah{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .acct .ah b{font-size:15px}
  .acct .no{font-size:18px;font-weight:700;letter-spacing:.5px;color:#23232b}
  .acct .bal{margin-top:8px;font-size:13px;color:var(--ink-2)}
  .acct .bal b{font-size:19px;color:var(--ink);font-weight:700;letter-spacing:.3px}
  .acct .foot{margin-top:auto;display:flex;align-items:center;padding-top:14px;color:var(--ink-3);font-size:13px}
  .acct .det{color:var(--link);font-weight:600;display:flex;align-items:center;gap:3px;cursor:pointer}

  /* worldcard */
  .wc-tools{display:flex;gap:34px;justify-content:flex-end}
  .wc-tool{display:flex;flex-direction:column;align-items:center;gap:7px;color:#3a3a42;font-size:12.5px;width:74px;text-align:center;cursor:pointer}
  .wc-tool .ic{width:30px;height:30px;color:#3a3a42;display:flex;align-items:center;justify-content:center}
  .bal-card{margin:18px 0 30px}
  .bal-card .bt{font-size:18px;font-weight:700}
  .bal-card .bx{color:var(--ink-3);font-size:13px;margin:6px 0 18px}
  .bal-card .bx b{color:#3a3a42}
  .chips{display:flex;gap:14px;align-items:center}
  .chip{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:12px;padding:10px 18px;min-width:150px}
  .chip b{font-size:17px}
  .chip small{color:var(--ink-3);font-size:12px}
  .chip-next{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink-3)}
  .filters{display:flex;gap:12px;align-items:center;margin:18px 0}
  .fsel{height:40px;border:1px solid var(--line);border-radius:8px;display:flex;align-items:center;padding:0 14px;color:var(--ink-2);gap:24px;font-size:13.5px}
  .fsearch{flex:1;max-width:260px;height:40px;border:1px solid var(--line);border-radius:8px;display:flex;align-items:center;gap:8px;padding:0 14px;color:var(--ink-3)}
  .fsearch input{border:none;outline:none;flex:1;font-family:inherit}
  .tbl{width:100%;border-collapse:collapse}
  .tbl th{text-align:left;color:var(--ink-2);font-weight:600;font-size:13px;padding:14px 12px;border-bottom:1px solid var(--line)}
  .tbl td{padding:16px 12px;border-bottom:1px solid var(--line-2);font-size:14px;vertical-align:middle}
  .tbl .right{text-align:right}
  .cardmini{display:flex;align-items:center;gap:14px}
  .cardmini .cv{width:64px;height:40px;border-radius:6px;flex:none;object-fit:cover;display:block}
  .badge{display:inline-block;background:var(--green-soft);color:var(--green);font-size:12px;font-weight:600;padding:3px 10px;border-radius:6px;margin-left:8px}
  .usebar{height:8px;width:220px;background:var(--line-2);border-radius:5px;overflow:hidden}
  .usebar i{display:block;height:100%;background:var(--red);border-radius:5px}

  /* fx / exchange / payee / generic */
  .conv{max-width:520px}
  .conv .leg{border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px}
  .conv .leg label{color:var(--ink-3);font-size:12.5px}
  .conv .leg .crow{display:flex;align-items:center;margin-top:8px;gap:10px}
  .conv .leg input{border:none;outline:none;font-size:22px;font-weight:700;flex:1;font-family:inherit;color:var(--ink);min-width:0}
  .conv .leg input.sm{font-size:16px;font-weight:600}
  .conv .pickc{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-weight:600;white-space:nowrap}
  .conv .swap{display:flex;justify-content:center;margin:-8px 0}
  .conv .swap div{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;color:var(--red)}
  .conv .note{display:flex;justify-content:space-between;color:var(--ink-2);font-size:13px;margin:6px 2px 20px}
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 0;color:var(--ink-3);gap:14px}
  .empty .ei{width:90px;height:90px;border-radius:50%;background:var(--line-2);display:flex;align-items:center;justify-content:center;color:#cdcdd4}
  .prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .prod{border:1px solid var(--line);border-radius:14px;padding:22px;display:flex;flex-direction:column;gap:10px}
  .prod .pi{width:44px;height:44px;border-radius:11px;background:#FFF1F5;color:var(--red);display:flex;align-items:center;justify-content:center}
  .prod h4{font-size:16px}
  .prod p{color:var(--ink-2);font-size:13px;line-height:1.7;flex:1}
  .prod .det{color:var(--link);font-weight:600;cursor:pointer}
  .kjb-bal{padding:24px 26px}
  .kjb-top{display:flex;align-items:flex-start}
  .kjb-l{color:#3a3a42;font-size:14px;display:flex;align-items:center;gap:6px;margin-bottom:10px}
  .kjb-amt{font-size:34px;font-weight:800;letter-spacing:.5px}
  .kjb-amt span{font-size:16px;color:var(--ink-2);font-weight:600;margin-left:8px}
  .kjb-notify{margin-left:auto;color:#6B6B72;font-size:13px;display:flex;align-items:center;gap:8px}

var fxDur='30天';
function fxHash(s){var h=2166136261;for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function fxRng(seed){return function(){seed=seed+0x6D2B79F5|0;var t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function fxDecOf(r){return r>=100?2:(r>=10?3:4);}
function fxDurCfg(dur){
  if(dur==='1天')return {n:48,k:0.42,labels:['09:30','11:00','13:00','14:30','16:00','17:30'],time:true};
  if(dur==='7天')return {n:56,k:0.74,days:7};
  if(dur==='14天')return {n:72,k:0.95,days:14};
  return {n:120,k:1.22,days:30};
}
function fxDateLabels(days){var out=[],now=new Date();for(var i=5;i>=0;i--){var d=new Date(now.getTime()-days*(i/5)*86400000);out.push(('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2));}return out;}
function fxSeries(from,to,dur){
  var cfg=fxDurCfg(dur),n=cfg.n,rng=fxRng(fxHash(from+'>'+to+'|'+dur)),h=fxHash(from+to);
  var volPct=(0.004+(h%55)/10000)*cfg.k, rate=fxRate(), shape=[],v=0,i;
  for(i=0;i<n;i++){ v+=(rng()-0.5)*0.7; v*=0.9; v+=Math.sin(i/n*Math.PI*2*(1+h%3))*0.05+Math.sin(i/n*Math.PI*(2+h%4))*0.03; shape.push(v); }
  var mx=1; for(i=0;i<n;i++){ if(Math.abs(shape[i])>mx)mx=Math.abs(shape[i]); }
  var endShape=shape[n-1];
  var red=shape.map(function(x){return rate+rate*volPct*((x-endShape)/mx);});
  var blue=red.map(function(y,i){return y-rate*0.0013+rate*0.0004*Math.sin(i*0.9+h%5);});
  var grey=red.map(function(y,i){return y+rate*0.0011+rate*0.0003*Math.cos(i*0.7+h%6);});
  var hi=-1e9,lo=1e9; for(i=0;i<n;i++){ if(red[i]>hi)hi=red[i]; if(grey[i]>hi)hi=grey[i]; if(red[i]<lo)lo=red[i]; if(blue[i]<lo)lo=blue[i]; }
  return {red:red,blue:blue,grey:grey,hi:hi,lo:lo,labels:cfg.time?cfg.labels:fxDateLabels(cfg.days),dec:fxDecOf(rate)};
}
function fxBuildChart(){

  var sx=function(i){return x0+(i/(s.red.length-1))*(x1-x0);},sy=function(v){return y0+(1-(v-yMin)/(yMax-yMin))*(y1-y0);};
  var path=function(a){return a.map(function(v,i){return (i?'L':'M')+sx(i).toFixed(1)+' '+sy(v).toFixed(1);}).join(' ');};
  var grid='';for(var g=0;g<5;g++){var gv=yMin+(yMax-yMin)*g/4;grid+='<line x1="'+x0+'" y1="'+sy(gv).toFixed(1)+'" x2="'+x1+'" y2="'+sy(gv).toFixed(1)+'" stroke="#F0F0F3"/>'+(g<4?'<text x="'+(x1+8)+'" y="'+(sy(gv)+4).toFixed(1)+'" font-size="11" fill="#9a9aa2">'+gv.toFixed(s.dec)+'</text>':'');}
  var xlab=s.labels.map(function(d,i){var anc=i===0?'start':(i===s.labels.length-1?'end':'middle');return '<text x="'+sx(i/(s.labels.length-1)*(s.red.length-1)).toFixed(1)+'" y="'+(H-8)+'" font-size="11" fill="#9a9aa2" text-anchor="'+anc+'">'+d+'</text>';}).join('');
  var tx=(x1-3).toFixed(1);

  return {svg:svg,hi:s.hi,lo:s.lo,dec:s.dec};
}

  document.getElementById('login').classList.add('hide');

let loggingIn=false;
function doLogin(){
  if(loggingIn) return; loggingIn=true;
  const b=document.getElementById('lg-btn');

  setTimeout(showApp,900);
}
function typeInto(el,text,done){let i=0;(function tick(){el.value=text.slice(0,i++);if(i<=text.length)setTimeout(tick,55);else if(done)done();})();}
